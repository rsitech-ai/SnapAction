name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test Swift package
        run: swift test
      - name: Build release configuration
        run: swift build -c release
      - name: Verify community build configuration
        run: bash script/test_build_configuration.sh
      - name: Test publication tooling
        run: python3 -m unittest discover -s Tests/ToolingTests -v
      - name: Check repository policy
        run: python3 script/check_repository_policy.py
