name: License compliance

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  root-license:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Report owner-approved license gate
        run: python3 script/check_repository_policy.py --license-gate
